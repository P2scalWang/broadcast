      ];

    const getCurrentTimestamp = () => {
      const now = new Date();
      return `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}/${now.getFullYear()}, ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
    };

    const formatDateTime = (ts) => {
      if (!ts || ts === 'null' || ts === 'undefined' || ts === '') return '-';
      let str = String(ts).replace(/^\[DateTime:\s*/, '').replace(/\]$/, '').trim();
      
      if (str.includes('T') && str.endsWith('Z')) {
         const d = new Date(str);
         if (!isNaN(d.getTime())) {
            return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
         }
      }
      
      const dateMatch = str.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
      const timeMatch = str.match(/(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?/);

      if (dateMatch) {
         const p1 = dateMatch[1].padStart(2, '0');
         const p2 = dateMatch[2].padStart(2, '0');
         const yr = dateMatch[3];
         let timeStr = '';
         if (timeMatch) {
            timeStr = ` ${timeMatch[1].padStart(2, '0')}:${timeMatch[2].padStart(2, '0')}`;
         }
         return `${p1}/${p2}/${yr}${timeStr}`;
      }
      
      return str;
    };

    const isNew = (ts) => {
      if (!ts) return false;
      try {
        let raw = String(ts).replace(/^\[DateTime:\s*/, '').replace(/\]$/, '').trim();
        const now = Date.now();
        const threshold = 48 * 60 * 60 * 1000; 

        let dNative = new Date(raw);
        if (!isNaN(dNative.getTime())) {
            const diff = now - dNative.getTime();
            if (diff >= -86400000 && diff < threshold) return true;
        }

        if (raw.includes('/')) {
          const parts = raw.split(/[\s,T]+/); 
          const datePart = parts.find(p => p.includes('/'));
          const timePart = parts.find(p => p.includes(':')) || '00:00:00';
          
          if (datePart) {
            const [p1, p2, p3] = datePart.split('/'); 
            const d1 = new Date(`${p3}-${p2.padStart(2, '0')}-${p1.padStart(2, '0')}T${timePart}`);
            const d2 = new Date(`${p3}-${p1.padStart(2, '0')}-${p2.padStart(2, '0')}T${timePart}`);
            
            const diff1 = isNaN(d1.getTime()) ? Infinity : now - d1.getTime();
            const diff2 = isNaN(d2.getTime()) ? Infinity : now - d2.getTime();

            if (diff1 >= -86400000 && diff1 < threshold) return true;
            if (diff2 >= -86400000 && diff2 < threshold) return true;
          }
        }
        return false;
      } catch { return false; }
    };

          try {
            const res = await fetch(url + `?nocache=${ts}`, { headers: { 'Accept': 'application/json' } });
            if (!res.ok) throw new Error('Network error');
            const json = await res.json();
            let dataArray = Array.isArray(json) ? json : (json.data || [json]);
            
            return dataArray.map((item, idx) => {
                const cleanItem = {};
                Object.keys(item).forEach(k => cleanItem[k] = item[k] === null || item[k] === undefined ? '' : String(item[k]));
                cleanItem['Row_Number'] = cleanItem['id'] || cleanItem['RowInSheet'] || String(idx);
                return cleanItem;
            }).sort((a, b) => {
                // Sort by id descending (newest first)
                const idA = parseInt(a['id'] || a['RowInSheet'] || '0', 10);
                const idB = parseInt(b['id'] || b['RowInSheet'] || '0', 10);
                if (idA !== idB) return idB - idA;
                // Fallback: sort by createdAt descending
                const dateA = new Date(a['createdAt'] || 0).getTime();
                const dateB = new Date(b['createdAt'] || 0).getTime();
                return dateB - dateA;
            }); 
          } catch (e) {
            console.error(e);
            return [];

            e.preventDefault(); searchInputRef.current?.focus();

            if (selectedOrder) setSelectedOrder(null); 
            if (isSidebarOpen) setIsSidebarOpen(false); 
            if (isAdding) setIsAdding(false); 
            if (editingOrder) setEditingOrder(null);
          }
          if (e.key === 'n' && !isModalOpen && !selectedOrder) { 
            e.preventDefault(); setIsAdding(true); 
          }
        };
        window.addEventListener('keydown', handleKey);
        return () => window.removeEventListener('keydown', handleKey);

                  <Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"/>
                  <input ref={searchInputRef} type="text" placeholder="ค้นหาชื่อ, รหัส, เลขที่... (กด /)" value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} className="w-full pl-9 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"/>
                </div>
                
                <div className="flex gap-2 mt-3">
                  <button onClick={()=>setFilters(f=>({...f,showNewOnly:!f.showNewOnly}))} className={`flex-1 px-3 py-1.5 rounded-lg text-xs font-medium border transition-all flex items-center justify-center gap-1 ${filters.showNewOnly ? (activeTab==='moh'?'bg-blue-50 border-blue-200 text-blue-700':'bg-emerald-50 border-emerald-200 text-emerald-700') :'border-slate-200 text-slate-600 hover:bg-slate-50'}`}>
                    {filters.showNewOnly && <span className="w-1.5 h-1.5 bg-red-500 rounded-full badge-new"></span>} ใหม่ 48ชม.
                  </button>
                </div>
              </div>

              <div className="flex-1 overflow-y-auto no-scrollbar p-2 space-y-1.5">
                {filteredData.map((order, idx) => {
                  const nName = order['ชื่อ'] || order['First_Name'] || '';
                  const nLast = order['นามสกุล'] || order['Last_Name'] || '';
                  const isSelected = selectedOrder && (selectedOrder['Row_Number'] === order['Row_Number']);
                  
                  return (
                    <button key={`${order['Row_Number']}-${idx}`} onClick={()=>handleSelect(order)} className={`w-full text-left p-3.5 rounded-2xl transition-all relative ${isSelected ? `bg-white shadow-md ring-1 ring-slate-200 border-l-4 ${activeTab==='moh'?'border-blue-500':'border-emerald-500'}` :'hover:bg-slate-50 border-l-4 border-transparent'}`}>
                      {isNew(getTimestamp(order)) && <span className="absolute -top-0.5 -right-0.5"><Badge variant="new" className="!text-[9px] !py-0 !px-1.5">NEW</Badge></span>}
                      <div className="flex items-start justify-between gap-2 mb-1">
                        <p className={`font-semibold text-sm truncate ${isSelected?themeClasses.text:'text-slate-700'}`}>
                          {(order['รหัสนักศึกษา'] || order['Student_ID']) && <span className="font-mono text-xs text-slate-400 mr-1.5">{order['รหัสนักศึกษา'] || order['Student_ID']}</span>}
                          {(order['คำนำหน้า'] || order['Title']) && <span className="text-slate-600">{order['คำนำหน้า'] || order['Title']} </span>} {nName} {nLast && <span className="text-slate-500"> {nLast}</span>}
                        </p>
                        <Badge variant={isSelected?themeClasses.badge:'default'} className="flex-shrink-0 text-[10px]">{getOrderId(order)}</Badge>
                      </div>
                      <div className="flex items-center justify-between text-xs text-slate-400 mt-1">
                        <span className="truncate pr-2">{getFaculty(order)}</span>
                        <span className="flex-shrink-0 font-medium whitespace-nowrap">{formatDateTime(getTimestamp(order))}</span>
                      </div>
                    </button>
                  );
                })}
              </div>
            </aside>

            {isSidebarOpen && <div className="fixed inset-0 bg-black/30 z-20 md:hidden" onClick={()=>setIsSidebarOpen(false)}/>}

            <main className="flex-1 overflow-y-auto bg-gradient-to-br from-slate-50 to-slate-100/50">
              {selectedOrder ? (
                <div className="max-w-5xl mx-auto p-4 md:p-6 lg:p-8 animate-enter">
                  <div className="flex justify-between items-center mb-4">
                    <button onClick={()=>setSelectedOrder(null)} className="md:hidden flex items-center gap-2 text-slate-600 hover:text-slate-800 px-3 py-2 bg-white rounded-xl border border-slate-200 shadow-sm text-sm">
                      <Icon name="chevron-left" className="w-4 h-4"/> กลับ
                    </button>
                    <button onClick={() => setEditingOrder(selectedOrder)} className="flex items-center gap-2 bg-white px-4 py-2 rounded-xl text-sm font-semibold text-slate-700 border border-slate-200 hover:bg-slate-50 shadow-sm transition-all ml-auto">
                      <Icon name="edit" className="w-4 h-4"/> แก้ไขข้อมูล
                    </button>
                  </div>
                  
                  <div className="bg-white rounded-3xl shadow-sm border border-slate-100 p-5 md:p-6 mb-5 relative overflow-hidden">
                    <div className={`absolute top-0 right-0 w-48 h-48 bg-gradient-to-br ${themeClasses.gradient} rounded-full blur-3xl opacity-10 -translate-y-1/2 translate-x-1/2`}></div>
                    <div className="relative z-10 flex flex-col md:flex-row md:items-start md:justify-between gap-4">
                      <div className="flex-1 min-w-0">
                        <div className="flex flex-wrap items-center gap-2 mb-2">
                          <Badge variant={themeClasses.badge}>{selectedOrder['สถาบัน'] || selectedOrder['Institution'] || selectedOrder['วิทยาเขต'] || selectedOrder['Campus'] || '-'}</Badge>
                          <span className="text-sm text-slate-500">{getFaculty(selectedOrder)}</span>
                        </div>
                        <h2 className="text-2xl md:text-3xl font-bold text-slate-900 leading-tight">
                          {(selectedOrder['คำนำหน้า'] || selectedOrder['Title']) && <span className="text-slate-700">{selectedOrder['คำนำหน้า'] || selectedOrder['Title']} </span>}
                          <span className="text-slate-900">{selectedOrder['ชื่อ'] || selectedOrder['First_Name']}</span>
                          {(selectedOrder['นามสกุล'] || selectedOrder['Last_Name']) && <span className="text-slate-500 font-normal"> {selectedOrder['นามสกุล'] || selectedOrder['Last_Name']}</span>}
                        </h2>
                        {(selectedOrder['รหัสนักศึกษา'] || selectedOrder['Student_ID']) && <p className={`font-mono text-lg mt-1 ${themeClasses.text}`}>{selectedOrder['รหัสนักศึกษา'] || selectedOrder['Student_ID']}</p>}
                      </div>
                      <div className="flex-shrink-0 bg-slate-50 rounded-2xl p-4 border border-slate-100 min-w-[160px] text-center md:text-right">
                        <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">{activeTab==='moh'?'เลขที่ใบจอง':'เลขที่ชุด'}</p>
                        <p className={`text-2xl font-black ${themeClasses.text} tracking-tight`}>{getOrderId(selectedOrder)}</p>
                        <p className="text-xs text-slate-400 mt-2 flex items-center md:justify-end gap-1"><Icon name="clock" className="w-3.5 h-3.5"/>{formatDateTime(getTimestamp(selectedOrder))}</p>
                      </div>
                    </div>
                  </div>

                  <div className="space-y-4">
                    {currentGroups.map((group) => {
                      const visibleFields = group.fields.filter(f => selectedOrder[f] && !isEmpty(selectedOrder[f]));
                      if (visibleFields.length === 0) return null;
                      
                      return (
                        <div key={group.id} className={`bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden ${group.system?'opacity-90':''}`}>
                          <div className="w-full px-5 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                              <div className={`w-8 h-8 rounded-xl ${themeClasses.soft} ${themeClasses.text} flex items-center justify-center`}><Icon name={group.icon} className="w-4 h-4"/></div>
                              <h3 className="font-semibold text-slate-800">{group.title}</h3>
                            </div>
                          </div>
                          <div className="px-5 pb-5 pt-0">
                            <div className={`grid gap-3 ${group.fields.length>6?'grid-cols-2 lg:grid-cols-3':'grid-cols-2'}`}>
                              {visibleFields.map((field, idx) => { 
                                const value = selectedOrder[field]; 
                                let displayValue = value;
                                if (['TimeStamp', 'ประทับเวลา', 'Timestamp', 'createdAt', 'Booking_Date', 'วันที่สั่งจอง', 'RowInSheet'].includes(field)) displayValue = formatDateTime(value) || value;
                                
                                return (
                                  <div key={idx}>
                                    <label className="block text-[11px] font-medium text-slate-400 mb-1 uppercase tracking-wide">{cleanLabel(field)}</label>
                                    <div className={`px-3 py-2.5 rounded-xl text-sm font-medium break-words ${isEmpty(value)?'bg-slate-50 text-slate-300 border border-slate-100':'bg-white text-slate-800 border border-slate-200'}`}>
                                      {['Row_Number', 'RowInSheet', 'id'].includes(field) && !isEmpty(value) ? <Badge variant="warning">ID/Row: {value}</Badge> : displayValue}
                                    </div>
                                  </div>
                                ); 
                              })}
                            </div>
                          </div>
                        </div>
                      )
                    })}
                  </div>
                </div>
              ) : (
                <div className="h-full flex flex-col items-center justify-center p-6 text-center animate-enter">
                  <div className={`w-20 h-20 rounded-3xl ${themeClasses.soft} ${themeClasses.text} flex items-center justify-center mb-5 shadow-sm`}><Icon name={activeTab==='moh'?'user':'list'} className="w-10 h-10"/></div>
                  <h3 className="text-xl font-bold text-slate-800 mb-2">เลือกรายการเพื่อดูรายละเอียด</h3>
                  <p className="text-slate-500 text-sm max-w-xs mb-6">คลิกเลือกรายการจากเมนูด้านซ้าย หรือใช้ช่องค้นหาเพื่อหาข้อมูลที่ต้องการ</p>
                </div>
              )}
            </main>
          </div>

          <button onClick={()=>setIsAdding(true)} className={`md:hidden fixed bottom-5 right-5 w-14 h-14 ${activeTab==='moh'?'bg-blue-600':'bg-emerald-600'} text-white rounded-full shadow-lg flex items-center justify-center z-30`}><Icon name="plus" className="w-7 h-7"/></button>

          {(isAdding || editingOrder) && (
            <OrderModal 
              isOpen={isAdding || !!editingOrder} 
              initialData={editingOrder} 
              onClose={() => { setIsAdding(false); setEditingOrder(null); }} 
              onSave={handleSave} 
              groups={currentGroups} 
              activeTab={activeTab}
              themeClasses={themeClasses}
            />
          )}

          {toast && <Toast message={toast.message} type={toast.type} onClose={()=>setToast(null)}/>}
        </div>
      );
    };

    const OrderModal = ({ isOpen, onClose, onSave, groups, activeTab, themeClasses, initialData }) => {
      const [mode, setMode] = useState('choose');
      const [step, setStep] = useState(1);
      const [formData, setFormData] = useState({});
      const [submitting, setSubmitting] = useState(false);
      const [selectedFiles, setSelectedFiles] = useState([]);
      const [dragOver, setDragOver] = useState(false);
      const fileInputRef = useRef(null);
      const isEditing = !!initialData; 
      
      if (!isOpen) return null;

      useEffect(() => {
        if (isOpen) {
          if (isEditing) {
            setMode('manual');
            setFormData(initialData);
            setStep(1);
          } else {
            setMode('choose');
            setFormData({});
            setStep(1);
            setSelectedFiles([]);
          }
        }
      }, [isOpen, initialData]);

      const handleFileSelect = (newFiles) => {
        if (!newFiles || newFiles.length === 0) return;
        const filesArray = Array.from(newFiles);
        setSelectedFiles(prev => [...prev, ...filesArray]);
        if (fileInputRef.current) fileInputRef.current.value = ''; 
      };

      const handleSaveUpload = async () => {
        if (selectedFiles.length === 0) return;
        setSubmitting(true);
        try {
          await onSave({ action: 'upload', files: selectedFiles, tab: activeTab, Row_Number: initialData?.Row_Number });
        } catch (e) { console.error(e); } finally { setSubmitting(false); }
      };

      const handleSaveManual = async () => {
        setSubmitting(true);
        try {
          const dataToSave = { ...formData };
          if (!isEditing) {
              dataToSave['ประทับเวลา'] = getCurrentTimestamp();
              dataToSave['Timestamp'] = getCurrentTimestamp();
              dataToSave['TimeStamp'] = getCurrentTimestamp();
              dataToSave['Booking_Date'] = getCurrentTimestamp();
              dataToSave['วันที่สั่งจอง'] = getCurrentTimestamp();
              dataToSave['Webapp'] = 'Yes';
          }
          
          groups.forEach(g => {
            g.fields.forEach(f => {
              if (dataToSave[f] === undefined) {
                dataToSave[f] = '';
              }
            });
          });
          
          await onSave({ action: isEditing ? 'edit' : 'add', dataWithTimestamp: dataToSave, tab: activeTab, Row_Number: initialData?.Row_Number });
        } catch (e) { console.error(e); } finally { setSubmitting(false); }
      };

      const currentGroup = mode === 'manual' ? groups[step - 1] : null;
      const progress = mode === 'manual' ? (step / Math.max(groups.length, 1)) * 100 : (mode === 'upload' ? 100 : 0);

      const getSelectedCampus = () => {
        return formData['Campus'] || formData['วิทยาเขต'] || '';
      };

      const isMaleOrdering = () => {
        const fieldName = currentGroup?.fields.find(f => cleanLabel(f).includes('สำหรับบัณฑิตชาย เท่านั้น'));
        if (fieldName && formData[fieldName] === 'สั่งจอง') return true;
        return false;
      };

      const getInnerSuitSelection = () => {
        for (const key of Object.keys(formData)) {
          if (cleanLabel(key).includes('สั่งจองชุดด้านใน')) return formData[key];
        }
        return null;
      };

      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 bg-black/50 backdrop-blur-sm animate-fade-in">
          <div className="bg-white rounded-t-3xl sm:rounded-3xl w-full sm:max-w-2xl max-h-[92vh] sm:max-h-[90vh] flex flex-col shadow-2xl animate-slide-up">
            
            <div className="flex items-center justify-between p-5 border-b border-slate-100 shrink-0">
              <div>
                <h3 className="font-bold text-lg text-slate-800">
                  {mode === 'choose' && 'เพิ่มรายการใหม่'}
                  {mode === 'upload' && '📎 อัปโหลดไฟล์'}
                  {mode === 'manual' && (isEditing ? '✏️ แก้ไขข้อมูล' : '✏️ กรอกข้อมูล')}
                </h3>
              </div>
              <button onClick={onClose} disabled={submitting} className="p-2 hover:bg-slate-100 rounded-xl transition-colors"><Icon name="x" className="w-5 h-5"/></button>
            </div>

            {mode === 'manual' && <div className="h-1 bg-slate-100 shrink-0"><div className={`h-full bg-gradient-to-r ${themeClasses.progress} transition-all duration-500`} style={{width:`${progress}%`}}/></div>}

            <div className="flex-1 overflow-y-auto">
              {mode === 'choose' && !isEditing && (
                <div className="p-6 md:p-8">
                  <div className="text-center mb-8"><h4 className="text-xl font-bold text-slate-800">คุณต้องการเพิ่มข้อมูลด้วยวิธีไหน?</h4></div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 max-w-lg mx-auto">
                    <button onClick={() => setMode('upload')} className="hover-lift group p-6 rounded-2xl border-2 border-slate-200 hover:border-blue-400 bg-white text-left transition-all">
                      <div className="w-14 h-14 rounded-2xl bg-blue-100 text-blue-600 flex items-center justify-center mb-4 group-hover:bg-blue-600 group-hover:text-white transition-all group-hover:scale-110"><Icon name="upload" className="w-7 h-7"/></div>
                      <h5 className="font-bold text-slate-800 text-lg mb-1 group-hover:text-blue-600">อัปโหลดไฟล์</h5>
                      <p className="text-sm text-slate-500 leading-relaxed">แนบไฟล์ PDF, รูปภาพ หรือเอกสาร (แนบหลายไฟล์ได้)</p>
                    </button>
                    <button onClick={() => { setMode('manual'); const ts = getCurrentTimestamp(); setFormData(prev => ({ ...prev, 'ประทับเวลา': ts, 'Timestamp': ts, 'TimeStamp': ts, 'Booking_Date': ts, 'วันที่สั่งจอง': ts })); }} className="hover-lift group p-6 rounded-2xl border-2 border-slate-200 hover:border-emerald-400 bg-white text-left transition-all">
                      <div className="w-14 h-14 rounded-2xl bg-emerald-100 text-emerald-600 flex items-center justify-center mb-4 group-hover:bg-emerald-600 group-hover:text-white transition-all group-hover:scale-110"><Icon name="edit" className="w-7 h-7"/></div>
                      <h5 className="font-bold text-slate-800 text-lg mb-1 group-hover:text-emerald-600">กรอกข้อมูลเอง</h5>
                      <p className="text-sm text-slate-500 leading-relaxed">พิมพ์กรอกรายละเอียดลงในฟอร์มทีละขั้นตอน</p>
                    </button>
                  </div>
                </div>
              )}

              {mode === 'upload' && (
                <div className="p-6 md:p-8">
                  <div className="flex flex-col items-center">
                    <div className={`w-full max-w-md border-2 border-dashed rounded-3xl p-6 sm:p-10 flex flex-col items-center text-center cursor-pointer transition-all ${dragOver ? 'border-blue-400 bg-blue-50 scale-[1.02]' : selectedFiles.length > 0 ? 'border-emerald-300 bg-emerald-50/30' : 'border-slate-200 hover:bg-blue-50/50'}`} onDragOver={(e) => { e.preventDefault(); setDragOver(true); }} onDragLeave={() => setDragOver(false)} onDrop={(e) => { e.preventDefault(); setDragOver(false); handleFileSelect(e.dataTransfer.files); }} onClick={() => selectedFiles.length === 0 && fileInputRef.current?.click()}>
                      <input ref={fileInputRef} type="file" className="hidden" multiple accept=".jpg,.jpeg,.png,.pdf,.doc,.docx" onChange={(e) => handleFileSelect(e.target.files)}/>
                      
                      {selectedFiles.length > 0 ? (
                        <div className="w-full">
                          <div className="w-16 h-16 mx-auto rounded-2xl bg-emerald-100 text-emerald-600 flex items-center justify-center mb-4"><Icon name="check-circle" className="w-8 h-8"/></div>
                          <div className="font-bold text-slate-800 text-lg mb-1 text-center">เลือกแล้ว {selectedFiles.length} ไฟล์</div>
                          
                          <div className="text-sm text-slate-500 mb-4 mt-3 space-y-1.5 max-h-40 overflow-y-auto text-left bg-white p-3 rounded-xl border border-slate-200 shadow-sm no-scrollbar">
                            {selectedFiles.map((f, i) => (
                              <div key={i} className="flex justify-between items-center bg-slate-50 border border-slate-100 p-2.5 rounded-lg">
                                <span className="truncate pr-2 text-slate-700 font-medium">{f.name}</span>
                                <button onClick={(e) => { e.stopPropagation(); setSelectedFiles(prev => prev.filter((_, idx) => idx !== i)); }} className="text-red-400 hover:bg-red-100 hover:text-red-600 p-1.5 rounded-md transition-colors shrink-0"><Icon name="x" className="w-4 h-4"/></button>
                              </div>
                            ))}
                          </div>
                          
                          <button onClick={(e) => { e.stopPropagation(); fileInputRef.current?.click(); }} className="text-sm text-blue-600 font-semibold hover:text-blue-800 hover:bg-blue-100 px-4 py-2 rounded-lg transition-colors inline-flex items-center gap-2">
                            <Icon name="plus" className="w-4 h-4" /> เพิ่มไฟล์อีก
                          </button>
                        </div>
                      ) : (
                        <div className="py-6">
                          <div className={`w-16 h-16 mx-auto rounded-2xl flex items-center justify-center mb-4 transition-all ${dragOver ? 'bg-blue-200 text-blue-600 scale-110' : 'bg-slate-100 text-slate-400'}`}><Icon name="upload" className="w-8 h-8"/></div>
                          <div className="font-bold text-slate-700 text-lg mb-1">ลากไฟล์มาวางที่นี่</div>
                          <div className="text-sm text-slate-500">หรือคลิกเพื่อเลือกไฟล์ (เลือกได้หลายไฟล์)</div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              )}

              {mode === 'manual' && currentGroup && (
                <div className="p-5 md:p-6">
                  <div className="flex items-center justify-between pb-4 mb-4 border-b border-slate-100">
                    <button onClick={() => { if (step > 1) setStep(s => s - 1); else if(isEditing) onClose(); else setMode('choose'); }} className="flex items-center gap-1.5 text-sm text-slate-400 hover:text-slate-600 font-medium transition-colors">
                      <Icon name="chevron-left" className="w-4 h-4"/> {step > 1 ? 'ก่อนหน้า' : (isEditing ? 'ยกเลิก' : 'กลับ')}
                    </button>
                    <div className="text-right"><span className="text-xs font-bold px-2.5 py-1 rounded-lg bg-slate-100 text-slate-600">{step} / {groups.length}</span></div>
                  </div>

                  <div className="flex items-center gap-3 mb-5">
                    <div className={`w-10 h-10 rounded-xl ${themeClasses.soft} ${themeClasses.text} flex items-center justify-center`}><Icon name={currentGroup.icon} className="w-5 h-5"/></div>
                    <div><h4 className="font-semibold text-slate-800">{currentGroup.title}</h4></div>
                  </div>

                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    {currentGroup.fields.map((field, idx) => {
                      const cLabel = cleanLabel(field);
                      
                      const isLong = ['Address', 'Booking_Details'].includes(field) || cLabel.length > 40;
                      
                      const isReadOnly = ['Timestamp', 'RowInSheet', 'id', 'Row_Number', 'ประทับเวลา', 'Booking_Date', 'วันที่สั่งจอง', 'Total_Inner_Suits', 'รวมชุดด้านใน'].includes(field);
                      
                      const isCampusField = activeTab === 'form' && field === 'Campus';
                      const isDegreeField = ['Degree_Level', 'Order_Degree_Gown'].includes(field);
                      
                      const isMaleOnlyOrderField = field === 'Male_Inner_Suit_Choice';
                      const isInnerSuitOrderField = field === 'Order_Inner_Suit_Male';
                      
                      const isSubOptionRajpattern = field === 'RajPattern_Shirt_With_Insignia';
                      const isSubOptionSubLieutenant = field === 'Acting_Sub_Lieutenant_Suit';
                      const isSubOptionOfficer = field === 'Civil_Servant_Suit';
                      
                      const isRajpatternSizeField = field.startsWith('RajPattern_') && !['RajPattern_Suit_Service_Type', 'RajPattern_Price', 'RajPattern_Deposit', 'RajPattern_Balance', 'RajPattern_Shirt_With_Insignia'].includes(field);
                      const isOtherSuitSizeField = field.startsWith('General_') || ['Crotch_Length_inch', 'Thigh_Circumference_inch', 'Pants_Length_inch'].includes(field);
                      
                      const isFacultyRelated = activeTab === 'form' && ['HatYai_Faculty_Color', 'Pattani_Faculty_Color', 'SuratThani_Faculty_Color', 'Trang_Faculty_Color', 'Phuket_Faculty_Color'].includes(field);
                      const isOrderTypeField = field === 'Order_Type';
                      
                      const isYesNoField = ['Order_Garment_Bag', 'Order_RajPattern_Suit', 'Order_Navy_Blue_Suit', 'Order_White_Suit', 'Order_Insignia', 'Order_Student_Uniform'].includes(field);
                      const isSuitServiceType = ['RajPattern_Suit_Service_Type', 'Gown_Service_Type'].includes(field);

                      if (activeTab === 'form') {
                          if (isInnerSuitOrderField && !isMaleOrdering()) return null;

                          const innerSuitSelection = getInnerSuitSelection();
                          if (isSubOptionRajpattern && innerSuitSelection !== 'สั่งจองเสื้อราชปะแตนพร้อมเครื่องหมาย') return null;
                          if (isSubOptionSubLieutenant && innerSuitSelection !== 'สั่งจองชุดว่าที่ร้อยตรี') return null;
                          if (isSubOptionOfficer && innerSuitSelection !== 'สั่งจองชุดข้าราชการ') return null;

                <div className="flex justify-between items-center gap-3">
                  <button onClick={() => step > 1 ? setStep(s => s - 1) : (isEditing ? onClose() : setMode('choose'))} disabled={submitting} className="px-5 py-2.5 rounded-xl border border-slate-200 text-slate-600 font-medium text-sm hover:bg-white transition-colors shrink-0 disabled:opacity-50">
                    {step > 1 ? '← ก่อนหน้า' : 'ยกเลิก'}
                  </button>
                  
                  {step < groups.length ? (
                    <button onClick={() => setStep(s => s + 1)} className={`w-full sm:w-auto px-6 py-2.5 rounded-xl font-medium text-sm flex items-center justify-center gap-2 text-white transition-all shadow-md ${themeClasses.btn}`}>ถัดไป <Icon name="chevron-right" className="w-4 h-4"/></button>
                  ) : (
                    <button onClick={handleSaveManual} disabled={submitting} className={`w-full sm:w-auto px-6 py-2.5 rounded-xl font-medium text-sm flex items-center justify-center gap-2 text-white transition-all shadow-md ${themeClasses.btn} ${submitting ? 'opacity-70 cursor-wait' : ''}`}>
                      {submitting ? <><span className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span> กำลังบันทึก...</> : <><Icon name="check" className="w-4 h-4"/> บันทึกข้อมูล</>}
                    </button>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
